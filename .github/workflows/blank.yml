name: Docker

on:
  push:
    branches:
      - master

  pull_request:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix: 
        PHP_VERSION: [lsphp73, lsphp74]
        TAG: [latest,'']
    steps:
      - run: echo ${{github.ref}}
      - run: echo ${{github.event_name}}
      - uses: actions/checkout@v2
      - name: Run tests
        if: ${{ github.ref == 'refs/heads/master' && github.event_name == 'push' }}
        run: |
          cd ${FOLDER}
          bash build.sh --ols ${OLS_VERSION} --php ${{ matrix.PHP_VERSION }} --tag ${{ matrix.TAG }} --push
        if: ${{ github.ref == 'refs/heads/master' && github.event_name == 'pull_request' }}
        run: |
          cd ${FOLDER}
          bash build.sh --ols ${OLS_VERSION} --php ${{ matrix.PHP_VERSION }} --tag ${{ matrix.TAG }}        
        env: 
          FOLDER: template 
          OLS_VERSION: 1.6.20
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

  